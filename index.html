<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#171717" />
    <title>出貨拍照</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>出貨拍照</h1>
          <p id="cameraStatus" class="status-text">啟動相機中</p>
        </div>
        <button id="restartCamera" class="icon-button" type="button" aria-label="重新啟動相機">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <path d="M21 3v6h-6" />
          </svg>
        </button>
      </header>

      <main class="workarea">
        <section class="camera-stage" aria-label="相機預覽">
          <video id="cameraView" autoplay muted playsinline></video>
          <canvas id="snapshotCanvas" hidden></canvas>
          <div id="cameraOverlay" class="camera-overlay">
            <span>等待相機權限</span>
          </div>
        </section>

        <section class="control-panel" aria-label="拍照設定">
          <button id="captureButton" class="capture-button" type="button" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M14.5 4h-5L8 6H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3l-1.5-2Z" />
              <circle cx="12" cy="13" r="3.5" />
            </svg>
            <span id="captureButtonText">請選種類</span>
          </button>

          <button id="fallbackButton" class="fallback-button" type="button" hidden>
            開啟相機拍照
          </button>
          <input id="fallbackInput" type="file" accept="image/*" capture="environment" hidden />

          <fieldset class="kind-group">
            <legend>種類</legend>
            <div class="kind-options" role="radiogroup" aria-label="種類">
              <button class="kind-button" type="button" role="radio" aria-checked="false" data-kind="1">1</button>
              <button class="kind-button" type="button" role="radio" aria-checked="false" data-kind="2">2</button>
              <button class="kind-button" type="button" role="radio" aria-checked="false" data-kind="3">3</button>
              <button class="kind-button" type="button" role="radio" aria-checked="false" data-kind="4">4</button>
            </div>
          </fieldset>

          <div class="select-grid">
            <label class="field">
              <span>類型</span>
              <select id="typeSelect"></select>
            </label>
            <label class="field">
              <span>廠商</span>
              <select id="vendorSelect"></select>
            </label>
          </div>

          <section class="zip-tool" aria-label="壓縮工具">
            <div class="zip-header">
              <h2>壓縮工具</h2>
              <span id="zipStatus">尚未選取 JPG</span>
            </div>
            <input id="zipInput" type="file" accept="image/jpeg,.jpg,.jpeg" multiple hidden />
            <div class="zip-actions">
              <button id="zipPickButton" class="secondary-button" type="button">選取 JPG</button>
              <button id="zipCreateButton" class="secondary-button strong" type="button" disabled>產生 ZIP</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
